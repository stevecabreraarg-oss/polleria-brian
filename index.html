<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#13251d" />
    <meta name="description" content="Registro de ventas y stock para polleria." />
    <title>Polleria Brian</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Polleria</p>
          <h1>Ventas del d&iacute;a</h1>
        </div>
        <div class="today-pill" id="todayLabel"></div>
      </header>

      <main>
        <section class="summary-grid" aria-label="Resumen">
          <article class="metric metric-strong">
            <span>Total hoy</span>
            <strong id="todayTotal">$0</strong>
          </article>
          <article class="metric">
            <span>Semana</span>
            <strong id="weekTotal">$0</strong>
          </article>
          <article class="metric">
            <span>Mes</span>
            <strong id="monthTotal">$0</strong>
          </article>
        </section>

        <nav class="tabs" aria-label="Secciones">
          <button class="tab is-active" data-view="saleView" type="button">Venta</button>
          <button class="tab" data-view="historyView" type="button">Historial</button>
          <button class="tab" data-view="stockView" type="button">Stock</button>
        </nav>

        <section class="view is-active" id="saleView">
          <form class="panel sale-form" id="saleForm">
            <label>
              <span>Fecha</span>
              <input id="saleDate" type="date" required />
            </label>

            <label>
              <span>Producto</span>
              <select id="productSelect" required></select>
            </label>

            <div class="split">
              <label>
                <span>Cantidad kg</span>
                <input id="quantityInput" type="number" min="0.01" step="0.01" inputmode="decimal" required />
              </label>
              <label>
                <span>Precio kg</span>
                <input id="unitPriceInput" type="number" min="0" step="1" inputmode="numeric" required />
              </label>
            </div>

            <div class="ticket">
              <div>
                <span>Importe</span>
                <strong id="saleTotal">$0</strong>
              </div>
              <small id="priceRule">Precio segun producto</small>
            </div>

            <button class="primary-action" type="submit">Registrar venta</button>
          </form>

          <section class="panel product-panel">
            <div class="section-title">
              <h2>Lista de precios</h2>
              <button class="icon-button" id="resetDemoButton" type="button" title="Limpiar datos">Borrar</button>
            </div>
            <div class="catalog-list" id="catalogList"></div>
          </section>
        </section>

        <section class="view" id="historyView">
          <section class="panel">
            <div class="section-title">
              <h2>Ventas</h2>
              <select id="periodFilter" aria-label="Periodo">
                <option value="day">D&iacute;a</option>
                <option value="week">Semana</option>
                <option value="month">Mes</option>
                <option value="all">Todo</option>
              </select>
            </div>
            <div class="export-row">
              <button class="secondary-action" id="exportCsv" type="button">Excel</button>
              <button class="secondary-action" id="exportPdf" type="button">PDF</button>
            </div>
            <div class="sales-list" id="salesList"></div>
          </section>
        </section>

        <section class="view" id="stockView">
          <section class="panel">
            <div class="section-title">
              <h2>Control de stock</h2>
              <span class="stock-total" id="stockTotal">0 kg</span>
            </div>
            <form class="stock-form" id="stockForm">
              <select id="stockProductSelect" required></select>
              <input id="stockQtyInput" type="number" min="0.01" step="0.01" inputmode="decimal" placeholder="Kg" required />
              <button class="secondary-action" type="submit">Sumar</button>
            </form>
            <div class="stock-list" id="stockList"></div>
          </section>
        </section>
      </main>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">Sin movimientos todavia.</div>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
